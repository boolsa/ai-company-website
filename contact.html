<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Microve.ai</title>
  <meta name="description" content="Tell us your workflow bottleneck and we will discuss practical automation options.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            terracotta: '#1E3A5F',
            sage: '#7A9E7E',
            coral: '#E07A5F',
            cream: '#FAF9F7',
            charcoal: '#2D3436',
            stone: '#636E72'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          }
        }
      }
    }
  </script>
  <style>
    html {
      scroll-behavior: smooth;
    }
    .text-stone {
      color: #636E72;
    }
    .bg-cream {
      background-color: #FAF9F7;
    }
    .text-charcoal {
      color: #2D3436;
    }
    a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
      outline: 2px solid #1E3A5F;
      outline-offset: 2px;
    }
    :focus:not(:focus-visible) {
      outline: none;
    }
    :root {
      --color-coral: #E07A5F;
      --color-navy: #1E3A5F;
      --color-cream: #FAF9F7;
    }
    @media (hover: none) and (pointer: coarse) {
      a, button {
        min-height: 44px;
        min-width: 44px;
      }
    }
    .text-highlight {
      background: linear-gradient(180deg, transparent 60%, rgba(224, 122, 95, 0.25) 60%);
      padding: 0 0.25rem;
      font-weight: 600;
    }
    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .tight-tracking {
      letter-spacing: -0.02em;
    }

    /* Dot Grid Background */
    body {
      position: relative;
      overflow-x: hidden;
      background-color: #FAF9F7 !important;
      background-image:
        radial-gradient(circle, rgba(30, 58, 95, 0.18) 1.5px, transparent 1.5px) !important;
      background-size: 28px 28px !important;
    }

    /* ── Nav ── */
    #site-nav {
      background-color: #FAF9F7;
      border-bottom: 1px solid rgba(99, 110, 114, 0.15);
      transition: box-shadow 0.25s ease, border-color 0.25s ease;
    }
    #site-nav.nav-scrolled {
      box-shadow: 0 1px 16px rgba(30, 58, 95, 0.08), 0 1px 3px rgba(30, 58, 95, 0.06);
      border-bottom-color: rgba(99, 110, 114, 0.22);
    }
    #site-nav .nav-inner {
      transition: padding-top 0.25s ease, padding-bottom 0.25s ease;
    }
    #site-nav.nav-scrolled .nav-inner {
      padding-top: 0.625rem;
      padding-bottom: 0.625rem;
    }

    /* Logo */
    .nav-logo {
      font-family: 'Inter', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1E3A5F;
      letter-spacing: -0.03em;
      line-height: 1;
      display: flex;
      align-items: baseline;
      gap: 0;
      text-decoration: none;
    }
    .nav-logo-tld {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6875rem;
      font-weight: 500;
      color: #636E72;
      letter-spacing: 0;
      margin-left: 1px;
      position: relative;
      top: -5px;
    }

    /* Desktop nav links */
    .nav-link {
      position: relative;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #636E72;
      text-decoration: none;
      padding-bottom: 2px;
      transition: color 0.18s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background-color: #E07A5F;
      border-radius: 2px;
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 0.2s ease;
    }
    .nav-link:hover {
      color: #1E3A5F;
    }
    .nav-link:hover::after {
      transform: scaleX(1);
    }
    .nav-link.active {
      color: #1E3A5F;
      font-weight: 600;
    }
    .nav-link.active::after {
      transform: scaleX(1);
    }

    /* CTA button */
    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: #E07A5F;
      color: #fff;
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.45rem 1rem;
      border-radius: 9999px;
      text-decoration: none;
      box-shadow: 0 1px 4px rgba(224, 122, 95, 0.35);
      transition: background-color 0.18s ease, box-shadow 0.18s ease, transform 0.15s ease;
    }
    .nav-cta:hover {
      background-color: #C96A4F;
      box-shadow: 0 3px 10px rgba(224, 122, 95, 0.4);
      transform: translateY(-1px);
    }
    .nav-cta:active {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(224, 122, 95, 0.3);
    }

    /* Mobile menu */
    #mobileMenu {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.25s ease;
      opacity: 0;
      border-top: 1px solid rgba(99, 110, 114, 0.1);
      background-color: #FAF9F7;
    }
    #mobileMenu.open {
      max-height: 320px;
      opacity: 1;
    }
    .mobile-nav-link {
      display: flex;
      align-items: center;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.9375rem;
      font-weight: 500;
      color: #636E72;
      text-decoration: none;
      min-height: 44px;
      transition: color 0.15s ease, background-color 0.15s ease;
      border-left: 2px solid transparent;
    }
    .mobile-nav-link:hover {
      color: #1E3A5F;
      background-color: rgba(30, 58, 95, 0.04);
    }
    .mobile-nav-link.active {
      color: #1E3A5F;
      font-weight: 600;
      background-color: rgba(30, 58, 95, 0.05);
      border-left-color: #E07A5F;
    }
    .mobile-nav-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem;
      border-radius: 9999px;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #fff;
      background-color: #E07A5F;
      text-decoration: none;
      min-height: 44px;
      box-shadow: 0 1px 4px rgba(224, 122, 95, 0.3);
      transition: background-color 0.15s ease;
    }
    .mobile-nav-cta:hover {
      background-color: #C96A4F;
    }

    /* Hamburger morph */
    .hamburger-line {
      display: block;
      width: 20px;
      height: 1.75px;
      background-color: #1E3A5F;
      border-radius: 2px;
      transition: transform 0.25s ease, opacity 0.2s ease;
      transform-origin: center;
    }
    #mobileMenuBtn[aria-expanded="true"] .hamburger-line:nth-child(1) {
      transform: translateY(5.75px) rotate(45deg);
    }
    #mobileMenuBtn[aria-expanded="true"] .hamburger-line:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }
    #mobileMenuBtn[aria-expanded="true"] .hamburger-line:nth-child(3) {
      transform: translateY(-5.75px) rotate(-45deg);
    }
  </style>
</head>
<body class="text-charcoal antialiased">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-[#1E3A5F] focus:text-white focus:px-4 focus:py-2 focus:rounded-sm focus:font-semibold">
    Skip to main content
  </a>

  <nav id="site-nav" class="sticky top-0 z-40" role="navigation" aria-label="Main navigation">
    <div class="nav-inner max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">

      <!-- Logo -->
      <a href="index.html" aria-label="Microve.ai — home" class="nav-logo">
        microve<span class="nav-logo-tld">.ai</span>
      </a>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-7">
        <a href="index.html" class="nav-link">Home</a>
        <a href="what-we-do.html" class="nav-link">What We Do</a>
        <a href="calculator.html" class="nav-link">Calculator</a>
        <a href="contact.html" aria-current="page" class="nav-cta" aria-label="Book a call with Microve.ai">
          Book a Call
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
            <path d="M2.5 6h7M6.5 3l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>

      <!-- Mobile Hamburger -->
      <button id="mobileMenuBtn"
              class="md:hidden flex flex-col justify-center gap-[4.5px] w-9 h-9 -mr-1 rounded-md focus:outline-none focus:ring-2 focus:ring-[#1E3A5F] focus:ring-offset-2"
              aria-label="Toggle navigation menu"
              aria-expanded="false"
              aria-controls="mobileMenu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div id="mobileMenu" role="region" aria-label="Mobile navigation">
      <div class="max-w-5xl mx-auto px-4 py-3 flex flex-col gap-1">
        <a href="index.html" class="mobile-nav-link">Home</a>
        <a href="what-we-do.html" class="mobile-nav-link">What We Do</a>
        <a href="calculator.html" class="mobile-nav-link">Calculator</a>
        <div class="pt-2 pb-1">
          <a href="contact.html" aria-current="page" class="mobile-nav-cta" style="background-color:#C96A4F;">Book a Call</a>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const btn = document.getElementById('mobileMenuBtn');
        const menu = document.getElementById('mobileMenu');

        // Scroll-aware nav
        const nav = document.getElementById('site-nav');
        window.addEventListener('scroll', function () {
          nav.classList.toggle('nav-scrolled', window.scrollY > 12);
        }, { passive: true });

        // Mobile toggle
        btn.addEventListener('click', function () {
          const isOpen = this.getAttribute('aria-expanded') === 'true';
          this.setAttribute('aria-expanded', String(!isOpen));
          menu.classList.toggle('open', !isOpen);
          document.body.style.overflow = !isOpen ? 'hidden' : '';
        });

        // Close on outside click
        document.addEventListener('click', function (e) {
          if (!nav.contains(e.target) && menu.classList.contains('open')) {
            btn.setAttribute('aria-expanded', 'false');
            menu.classList.remove('open');
            document.body.style.overflow = '';
          }
        });

        // Close on Escape
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && menu.classList.contains('open')) {
            btn.setAttribute('aria-expanded', 'false');
            menu.classList.remove('open');
            document.body.style.overflow = '';
            btn.focus();
          }
        });
      })();
    </script>
  </nav>

  <main id="main-content" class="max-w-3xl mx-auto px-6 pt-24 pb-32">
    <header class="text-center mb-10">
      <h1 class="font-sans text-5xl md:text-7xl font-bold mb-4 tight-tracking text-[#1E3A5F]">Book a call</h1>
      <p class="text-stone text-lg">Tell us the workflow step that frustrates your team the most.</p>
    </header>

    <section class="bg-white border border-stone/15 rounded-sm p-7">
      <form id="contactForm" class="space-y-5" novalidate>
        <div>
          <label for="name" class="block font-semibold mb-2">Name <span class="text-[#E07A5F]">*</span></label>
          <input id="name" name="name" required class="w-full border border-stone/30 rounded-sm px-4 py-3 focus:border-[#E07A5F] focus:ring-2 focus:ring-[#E07A5F]/20 transition-all duration-200" type="text" placeholder="Your name" aria-describedby="name-error">
          <p id="name-error" class="hidden mt-1 text-sm text-[#E07A5F]" role="alert"></p>
        </div>

        <div>
          <label for="email" class="block font-semibold mb-2">Email <span class="text-[#E07A5F]">*</span></label>
          <input id="email" name="email" required class="w-full border border-stone/30 rounded-sm px-4 py-3 focus:border-[#E07A5F] focus:ring-2 focus:ring-[#E07A5F]/20 transition-all duration-200" type="email" placeholder="you@company.com" aria-describedby="email-error">
          <p id="email-error" class="hidden mt-1 text-sm text-[#E07A5F]" role="alert"></p>
        </div>

        <div>
          <label for="company" class="block font-semibold mb-2">Company</label>
          <input id="company" name="company" class="w-full border border-stone/30 rounded-sm px-4 py-3 focus:border-[#E07A5F] focus:ring-2 focus:ring-[#E07A5F]/20 transition-all duration-200" type="text" placeholder="Company name">
        </div>

        <div>
          <label for="workflow" class="block font-semibold mb-2">What workflow step should be automated? <span class="text-[#E07A5F]">*</span></label>
          <textarea id="workflow" name="workflow" rows="5" required class="w-full border border-stone/30 rounded-sm px-4 py-3 focus:border-[#E07A5F] focus:ring-2 focus:ring-[#E07A5F]/20 transition-all duration-200 resize-y" placeholder="Describe the repetitive step and why it is frustrating." aria-describedby="workflow-error"></textarea>
          <p id="workflow-error" class="hidden mt-1 text-sm text-[#E07A5F]" role="alert"></p>
        </div>

        <button type="submit" id="submitBtn" class="bg-[#E07A5F] text-white px-7 py-3 rounded-sm font-semibold hover:bg-[#C96A4F] transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-[#E07A5F] focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 min-w-[120px] uppercase tracking-wider text-sm">
          <svg id="spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span id="btnText">Send</span>
        </button>
      </form>

      <div id="success" class="hidden mt-5 p-4 bg-emerald-50 border border-emerald-200 rounded-sm" role="alert" tabindex="-1">
        <p class="text-emerald-700 font-medium flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          Thanks! We'll get back to you within 24 hours.
        </p>
      </div>
    </section>
  </main>

  <footer class="py-12 text-center text-sm text-stone border-t border-stone/10">
    <p>&copy; 2026 Microve.ai</p>
  </footer>

  <script>
    const form = document.getElementById('contactForm');
    const success = document.getElementById('success');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');

    // Real-time validation
    const inputs = form.querySelectorAll('input[required], textarea[required]');
    
    function validateField(field) {
      const errorEl = document.getElementById(field.id + '-error');
      let isValid = true;
      let message = '';
      
      if (!field.value.trim()) {
        isValid = false;
        message = 'This field is required';
      } else if (field.type === 'email' && field.value) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(field.value)) {
          isValid = false;
          message = 'Please enter a valid email address';
        }
      }
      
      if (!isValid && field.value) {
        field.classList.add('border-[#E07A5F]');
        field.classList.remove('border-stone/30');
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
      } else {
        field.classList.remove('border-[#E07A5F]');
        field.classList.add('border-stone/30');
        errorEl.classList.add('hidden');
      }
      
      return isValid;
    }

    inputs.forEach(input => {
      input.addEventListener('blur', () => validateField(input));
      input.addEventListener('input', () => {
        if (input.classList.contains('border-[#E07A5F]')) {
          validateField(input);
        }
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Validate all fields
      let isFormValid = true;
      inputs.forEach(input => {
        if (!validateField(input)) {
          isFormValid = false;
          input.focus();
        }
      });
      
      if (!isFormValid) return;
      
      // Show loading state
      submitBtn.disabled = true;
      btnText.textContent = 'Sending...';
      spinner.classList.remove('hidden');
      
      // Simulate API call (replace with actual fetch)
      await new Promise(resolve => setTimeout(resolve, 1500));
      
      // Reset form and show success
      form.reset();
      submitBtn.disabled = false;
      btnText.textContent = 'Send';
      spinner.classList.add('hidden');
      success.classList.remove('hidden');
      success.focus();
      
      // Smooth scroll to success message
      success.scrollIntoView({ behavior: 'smooth', block: 'center' });
      
      // Hide success after 5 seconds
      setTimeout(() => {
        success.classList.add('hidden');
      }, 5000);
    });
  </script>
</body>
</html>
