<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Microve.ai</title>
  <meta name="description" content="Tell us your workflow bottleneck and we will discuss practical automation options.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            terracotta: '#C65D3B',
            cream: '#FDF8F3',
            charcoal: '#1A1A1A',
            stone: '#78716c'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-cream text-charcoal antialiased">
  <nav class="border-b border-stone/20 bg-cream/95 backdrop-blur sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="font-serif text-2xl font-bold text-terracotta">microve<span class="text-xs text-stone align-top">.ai</span></a>
      <div class="flex items-center gap-6 text-sm">
        <a href="what-we-do.html" class="hover:text-terracotta">What We Do</a>
        <a href="calculator.html" class="hover:text-terracotta">Calculator</a>
        <a href="contact.html" class="text-terracotta font-semibold">Book a Call</a>
      </div>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 py-16">
    <header class="text-center mb-10">
      <h1 class="font-serif text-4xl md:text-5xl font-bold mb-4">Book a call</h1>
      <p class="text-stone">Tell us the workflow step that frustrates your team the most.</p>
    </header>

    <section class="bg-white border border-stone/15 rounded-2xl p-7">
      <form id="contactForm" class="space-y-5">
        <div>
          <label for="name" class="block font-semibold mb-2">Name</label>
          <input id="name" name="name" required class="w-full border border-stone/30 rounded-lg px-4 py-3" type="text" placeholder="Your name">
        </div>

        <div>
          <label for="email" class="block font-semibold mb-2">Email</label>
          <input id="email" name="email" required class="w-full border border-stone/30 rounded-lg px-4 py-3" type="email" placeholder="you@company.com">
        </div>

        <div>
          <label for="company" class="block font-semibold mb-2">Company</label>
          <input id="company" name="company" class="w-full border border-stone/30 rounded-lg px-4 py-3" type="text" placeholder="Company name">
        </div>

        <div>
          <label for="workflow" class="block font-semibold mb-2">What workflow step should be automated?</label>
          <textarea id="workflow" name="workflow" rows="5" required class="w-full border border-stone/30 rounded-lg px-4 py-3" placeholder="Describe the repetitive step and why it is frustrating."></textarea>
        </div>

        <button type="submit" class="bg-terracotta text-white px-7 py-3 rounded-full font-semibold">Send</button>
      </form>

      <p id="success" class="hidden mt-5 text-emerald-700 font-medium">Thanks. We will get back to you shortly.</p>
    </section>
  </main>

  <footer class="py-8 text-center text-sm text-stone">
    © 2026 Microve.ai
  </footer>

  <script>
    const form = document.getElementById('contactForm');
    const success = document.getElementById('success');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      form.reset();
      success.classList.remove('hidden');
    });
  </script>
</body>
</html>
