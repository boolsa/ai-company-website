<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Microve.ai</title>
  <meta name="description" content="Tell us your workflow bottleneck and we will discuss practical automation options.">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            terracotta: '#1E3A5F',
            sage: '#7A9E7E',
            cream: '#FAF9F7',
            charcoal: '#2D3436',
            stone: '#636E72'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif']
          }
        }
      }
    }
  </script>
  <style>
    html {
      scroll-behavior: smooth;
    }
    .text-stone {
      color: #636E72;
    }
    .bg-cream {
      background-color: #FAF9F7;
    }
    .text-charcoal {
      color: #2D3436;
    }
    a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible {
      outline: 2px solid #1E3A5F;
      outline-offset: 2px;
    }
    :focus:not(:focus-visible) {
      outline: none;
    }
    @media (hover: none) and (pointer: coarse) {
      a, button {
        min-height: 44px;
        min-width: 44px;
      }
    }
  </style>
</head>
<body class="bg-cream text-charcoal antialiased">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-[#1E3A5F] focus:text-white focus:px-4 focus:py-2 focus:rounded-lg focus:font-semibold">
    Skip to main content
  </a>

  <nav class="border-b border-stone/20 bg-cream/95 backdrop-blur sticky top-0 z-40">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="font-serif text-2xl font-bold text-[#1E3A5F]">microve<span class="text-xs text-stone align-top">.ai</span></a>
      
      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center gap-6 text-sm">
        <a href="what-we-do.html" class="hover:text-[#1E3A5F] transition-colors duration-200">What We Do</a>
        <a href="calculator.html" class="hover:text-[#1E3A5F] transition-colors duration-200">Calculator</a>
        <a href="contact.html" aria-current="page" class="text-[#1E3A5F] font-semibold">Book a Call</a>
      </div>
      
      <!-- Mobile Hamburger Button -->
      <button id="mobileMenuBtn" class="md:hidden p-2 -mr-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#1E3A5F] focus:ring-offset-2" aria-label="Toggle menu" aria-expanded="false">
        <svg id="menuIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
        <svg id="closeIcon" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    
    <!-- Mobile Menu -->
    <div id="mobileMenu" class="hidden md:hidden border-t border-stone/10 bg-cream/98 backdrop-blur">
      <div class="max-w-5xl mx-auto px-6 py-4 flex flex-col gap-4">
        <a href="what-we-do.html" class="py-3 px-4 text-stone hover:text-[#1E3A5F] hover:bg-[#1E3A5F]/5 rounded-lg transition-colors duration-200 min-h-[44px] flex items-center">What We Do</a>
        <a href="calculator.html" class="py-3 px-4 text-stone hover:text-[#1E3A5F] hover:bg-[#1E3A5F]/5 rounded-lg transition-colors duration-200 min-h-[44px] flex items-center">Calculator</a>
        <a href="contact.html" aria-current="page" class="py-3 px-4 text-[#1E3A5F] bg-[#1E3A5F]/5 rounded-lg font-semibold min-h-[44px] flex items-center">Book a Call</a>
      </div>
    </div>

    <script>
      document.getElementById('mobileMenuBtn').addEventListener('click', function() {
        const menu = document.getElementById('mobileMenu');
        const menuIcon = document.getElementById('menuIcon');
        const closeIcon = document.getElementById('closeIcon');
        const isExpanded = this.getAttribute('aria-expanded') === 'true';
        
        this.setAttribute('aria-expanded', !isExpanded);
        menu.classList.toggle('hidden');
        menuIcon.classList.toggle('hidden');
        closeIcon.classList.toggle('hidden');
        document.body.classList.toggle('overflow-hidden', !isExpanded);
      });
    </script>
  </nav>

  <main id="main-content" class="max-w-3xl mx-auto px-6 py-16">
    <header class="text-center mb-10">
      <h1 class="font-serif text-4xl md:text-5xl font-bold mb-4">Book a call</h1>
      <p class="text-stone">Tell us the workflow step that frustrates your team the most.</p>
    </header>

    <section class="bg-white border border-stone/15 rounded-2xl p-7">
      <form id="contactForm" class="space-y-5" novalidate>
        <div>
          <label for="name" class="block font-semibold mb-2">Name <span class="text-[#1E3A5F]">*</span></label>
          <input id="name" name="name" required class="w-full border border-stone/30 rounded-lg px-4 py-3 focus:border-[#1E3A5F] focus:ring-2 focus:ring-[#1E3A5F]/20 transition-all duration-200" type="text" placeholder="Your name" aria-describedby="name-error">
          <p id="name-error" class="hidden mt-1 text-sm text-[#1E3A5F]" role="alert"></p>
        </div>

        <div>
          <label for="email" class="block font-semibold mb-2">Email <span class="text-[#1E3A5F]">*</span></label>
          <input id="email" name="email" required class="w-full border border-stone/30 rounded-lg px-4 py-3 focus:border-[#1E3A5F] focus:ring-2 focus:ring-[#1E3A5F]/20 transition-all duration-200" type="email" placeholder="you@company.com" aria-describedby="email-error">
          <p id="email-error" class="hidden mt-1 text-sm text-[#1E3A5F]" role="alert"></p>
        </div>

        <div>
          <label for="company" class="block font-semibold mb-2">Company</label>
          <input id="company" name="company" class="w-full border border-stone/30 rounded-lg px-4 py-3 focus:border-[#1E3A5F] focus:ring-2 focus:ring-[#1E3A5F]/20 transition-all duration-200" type="text" placeholder="Company name">
        </div>

        <div>
          <label for="workflow" class="block font-semibold mb-2">What workflow step should be automated? <span class="text-[#1E3A5F]">*</span></label>
          <textarea id="workflow" name="workflow" rows="5" required class="w-full border border-stone/30 rounded-lg px-4 py-3 focus:border-[#1E3A5F] focus:ring-2 focus:ring-[#1E3A5F]/20 transition-all duration-200 resize-y" placeholder="Describe the repetitive step and why it is frustrating." aria-describedby="workflow-error"></textarea>
          <p id="workflow-error" class="hidden mt-1 text-sm text-[#1E3A5F]" role="alert"></p>
        </div>

        <button type="submit" id="submitBtn" class="bg-[#1E3A5F] text-white px-7 py-3 rounded-full font-semibold hover:bg-[#152D4A] transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-[#1E3A5F] focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 min-w-[120px]">
          <svg id="spinner" class="hidden w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span id="btnText">Send</span>
        </button>
      </form>

      <div id="success" class="hidden mt-5 p-4 bg-emerald-50 border border-emerald-200 rounded-lg" role="alert" tabindex="-1">
        <p class="text-emerald-700 font-medium flex items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          Thanks! We'll get back to you within 24 hours.
        </p>
      </div>
    </section>
  </main>

  <footer class="py-12 text-center text-sm text-stone border-t border-stone/10">
    <p>&copy; 2026 Microve.ai</p>
  </footer>

  <script>
    const form = document.getElementById('contactForm');
    const success = document.getElementById('success');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const spinner = document.getElementById('spinner');

    // Real-time validation
    const inputs = form.querySelectorAll('input[required], textarea[required]');
    
    function validateField(field) {
      const errorEl = document.getElementById(field.id + '-error');
      let isValid = true;
      let message = '';
      
      if (!field.value.trim()) {
        isValid = false;
        message = 'This field is required';
      } else if (field.type === 'email' && field.value) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(field.value)) {
          isValid = false;
          message = 'Please enter a valid email address';
        }
      }
      
      if (!isValid && field.value) {
        field.classList.add('border-[#1E3A5F]');
        field.classList.remove('border-stone/30');
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
      } else {
        field.classList.remove('border-[#1E3A5F]');
        field.classList.add('border-stone/30');
        errorEl.classList.add('hidden');
      }
      
      return isValid;
    }

    inputs.forEach(input => {
      input.addEventListener('blur', () => validateField(input));
      input.addEventListener('input', () => {
        if (input.classList.contains('border-[#1E3A5F]')) {
          validateField(input);
        }
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Validate all fields
      let isFormValid = true;
      inputs.forEach(input => {
        if (!validateField(input)) {
          isFormValid = false;
          input.focus();
        }
      });
      
      if (!isFormValid) return;
      
      // Show loading state
      submitBtn.disabled = true;
      btnText.textContent = 'Sending...';
      spinner.classList.remove('hidden');
      
      // Simulate API call (replace with actual fetch)
      await new Promise(resolve => setTimeout(resolve, 1500));
      
      // Reset form and show success
      form.reset();
      submitBtn.disabled = false;
      btnText.textContent = 'Send';
      spinner.classList.add('hidden');
      success.classList.remove('hidden');
      success.focus();
      
      // Smooth scroll to success message
      success.scrollIntoView({ behavior: 'smooth', block: 'center' });
      
      // Hide success after 5 seconds
      setTimeout(() => {
        success.classList.add('hidden');
      }, 5000);
    });
  </script>
</body>
</html>
