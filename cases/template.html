<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} | Microve.ai</title>
    <meta name="description" content="Custom A.I. automation tools">
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#1E293B',
                            dark: '#0f172a',
                            light: '#334155',
                        },
                        accent: {
                            DEFAULT: '#F97316',
                            dark: '#ea580c',
                            light: '#fb923c',
                        },
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .tight-tracking {
            letter-spacing: -0.02em;
        }
        .gradient-line {
            background: linear-gradient(to right, rgba(30, 41, 59, 0.2), rgba(30, 41, 59, 0.4), #F97316);
        }
    </style>
</head>
<body class="bg-white text-gray-900 antialiased">
  <!-- Skip Link -->
<a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-primary focus:text-white focus:px-4 focus:py-2 focus:rounded focus:font-semibold">
    Skip to main content
</a>

<!-- Navigation -->
<nav class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-200/80">
    <div class="max-w-6xl mx-auto px-6 py-5">
        <div class="flex items-center justify-between">
            <a href="../index.html" class="text-xl font-bold text-primary" aria-label="Microve.ai — home">
                microve<span class="text-accent">.ai</span>
            </a>
            <div class="hidden md:flex items-center space-x-6 text-sm">
                <a href="../index.html" class="text-gray-600 hover:text-primary transition-colors">Home</a>
                <a href="../what-we-do.html" class="text-gray-600 hover:text-primary transition-colors">What We Do</a>
                <a href="../cases.html" class="text-gray-600 hover:text-primary transition-colors">Cases</a>
                <a href="../blog.html" class="text-gray-600 hover:text-primary transition-colors">Blog</a>
                <a href="../about.html" class="text-gray-600 hover:text-primary transition-colors">About</a>
                <a href="../pricing.html" class="text-gray-600 hover:text-primary transition-colors">Pricing</a>
                <a href="../contact.html" class="text-gray-600 hover:text-primary transition-colors">Contact</a>
            </div>
        </div>
    </div>
</nav>

  <main class="max-w-4xl mx-auto px-6 pt-16 pb-32">
    <!-- Header -->
    <header class="mb-12">
      <div class="flex items-center gap-3 mb-6">
        <span class="text-xs font-mono bg-primary/10 text-primary px-3 py-1 rounded-full uppercase tracking-wider">{{INDUSTRY}}</span>
        <span class="text-sm text-gray-600">{{COMPANY_INFO}}</span>
      </div>
      <h1 class="font-sans text-4xl md:text-5xl font-bold text-primary mb-6 leading-[1.1]">{{TITLE}}</h1>
      <p class="text-xl text-gray-600 leading-relaxed">{{SUBTITLE}}</p>
    </header>

    <!-- Metrics -->
    <div class="grid grid-cols-3 gap-4 mb-16 py-8 border-y border-primary/10">
      <div class="text-center">
        <div class="text-3xl font-bold text-accent mb-1">{{METRIC_1_VAL}}</div>
        <div class="text-xs text-gray-600 uppercase tracking-wider">{{METRIC_1_LABEL}}</div>
      </div>
      <div class="text-center border-l border-primary/10">
        <div class="text-3xl font-bold text-accent mb-1">{{METRIC_2_VAL}}</div>
        <div class="text-xs text-gray-600 uppercase tracking-wider">{{METRIC_2_LABEL}}</div>
      </div>
      <div class="text-center border-l border-primary/10">
        <div class="text-3xl font-bold text-accent mb-1">{{METRIC_3_VAL}}</div>
        <div class="text-xs text-gray-600 uppercase tracking-wider">{{METRIC_3_LABEL}}</div>
      </div>
    </div>

    <!-- Content -->
    <article class="space-y-12">
      {{CONTENT}}
    </article>
  </main>
</body>
</html>
